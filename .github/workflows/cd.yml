name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"

      - name: Build production binary
        run: scripts/buildprod.sh

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: notely-495116
          service_account_key: ${{ secrets.GCP_CREDENTIALS }}
          export_default_credentials: true

      - name: Authenticate to GCP explicitly
        run: |
          cat > /tmp/service-account.json <<'EOF'
${{ secrets.GCP_CREDENTIALS }}
EOF
          gcloud auth activate-service-account --key-file=/tmp/service-account.json
          gcloud config set project notely-495116

      - name: Build and push Docker image
        run: |
          gcloud auth list
          gcloud builds submit --tag us-central1-docker.pkg.dev/notely-495116/notely-ar-repo/notely:latest .
